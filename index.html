<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Premio Acumulado</title>


<style>

html,body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}


.card{

    margin:20px;
    padding:22px 28px;

    display:inline-block;

    background:rgba(20,20,20,.75);

    border-radius:18px;

    color:white;

    box-shadow:0 0 20px rgba(0,0,0,.4);

}


.title{

    font-size:28px;
    font-weight:bold;

}


.money{

    margin-top:12px;

    font-size:60px;

    font-weight:900;

}

</style>

</head>


<body>


<div class="card">

<div class="title">
💰 PREMIO ACUMULADO
</div>


<div class="money" id="money">
$10.000,00
</div>


</div>



<script>


const INICIO = 10000;

const VELOCIDAD = 10000 / 3600000;


let inicioTiempo;
let pausado;
let valorPausado;



function cargar(){

    inicioTiempo =
    Number(localStorage.getItem("inicioTiempo"));


    pausado =
    localStorage.getItem("pausado") === "true";


    valorPausado =
    Number(localStorage.getItem("valorPausado"))
    || INICIO;



    if(!inicioTiempo){

        inicioTiempo = Date.now();


        localStorage.setItem(
            "inicioTiempo",
            inicioTiempo
        );

    }

}



cargar();




function obtenerValor(){


    if(pausado){

        return valorPausado;

    }


    return INICIO +
    ((Date.now()-inicioTiempo)*VELOCIDAD);


}




function formato(numero){

    return numero.toLocaleString(
        "es-CO",
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );

}




function actualizar(){


    document.getElementById("money").innerHTML =
    "$" + formato(obtenerValor());


    requestAnimationFrame(actualizar);

}



actualizar();





window.addEventListener(
"storage",
function(){

    cargar();

});



</script>


</body>
</html>
