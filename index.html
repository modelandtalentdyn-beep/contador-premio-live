<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Premio Acumulado</title>

<style>
html, body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    display:inline-block;
    margin:20px;
    padding:22px 28px;
    background:rgba(20,20,20,.75);
    border-radius:18px;
    color:#fff;
    box-shadow:0 0 20px rgba(0,0,0,.35);
    backdrop-filter:blur(8px);
}

.title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:12px;
}

.value{
    font-size:60px;
    font-weight:800;
    letter-spacing:1px;
}
</style>

</head>
<body>

<div class="card">

    <div class="title">
        💰 PREMIO ACUMULADO
    </div>

    <div id="money" class="value">
        $10.000,00
    </div>

</div>

<script>

const START = 10000;
const PER_HOUR = 10000;
const RATE = PER_HOUR / 3600000;

let startTime = Number(localStorage.getItem("startTime"));

if(!startTime){
    startTime = Date.now();
    localStorage.setItem("startTime", startTime);
}

function formatCOP(value){
    return value.toLocaleString("es-CO",{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function currentValue(){
    const elapsed = Date.now() - startTime;
    return START + elapsed * RATE;
}

function render(){
    document.getElementById("money").textContent =
        "$" + formatCOP(currentValue());

    requestAnimationFrame(render);
}

render();

</script>

</body>
</html>
